image: $DOCKER_IMAGE

stages:
  - test
  - deploy

# Template for test jobs
.test_python_template:
  stage: test
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends python3-venv
    - python3 -m venv .venv
    - . .venv/bin/activate
    - pip install -r wsh_shell_adapter/requirements.txt
    - pip install -r tests/requirements.txt
  script:
    - make example
    - pytest -q tests -vv

# Job for adapter tests
test_wsh_shell_adapter:
  extends: .test_python_template
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main")'

# Template for deploy jobs
.deploy_github_pages_template:
  stage: deploy
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends doxygen python3-venv
    - python3 -m venv .venv
    - . .venv/bin/activate
    - pip install -r requirements.txt
    - git config user.name "$GITHUB_USER"
    - git config user.email "$GITHUB_USER@users.noreply.github.com"
    - git remote remove github 2>/dev/null || true
    - git remote add github "https://x-access-token:${GITHUB_ACCESS_TOKEN}@github.com/whoosh-bike/wsh-shell.git"
    - git fetch github +refs/heads/gh-pages:refs/heads/gh-pages --depth=1 || true

# Job for deploy docs (DEV)
deploy_github_pages_dev:
  extends: .deploy_github_pages_template
  script:
    - mike deploy --config-file mkdocs.yml --branch gh-pages --remote github dev --push -u --ignore-remote-status
    - echo "🔗 https://whoosh-bike.github.io/wsh-shell/dev/"
  only:
    - dev

# Job for deploy docs (MAIN)
deploy_github_pages_main:
  extends: .deploy_github_pages_template
  script:
    - mike deploy --config-file mkdocs.yml --branch gh-pages --remote github main --push -u --ignore-remote-status
    - mike set-default --branch gh-pages --remote github main --push
    - echo "🔗 https://whoosh-bike.github.io/wsh-shell/"
  only:
    - main
